<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background-color:#56c6ef;
    color: aliceblue;
}

.outer{
    background-color:#292931;
    height: 600px;
    border: 2px;
    border-radius:50px;
    margin:90px;
    padding-left:100px;
    padding-top:30px; 
}

.content{
    /*margin-left: 50px;*/
    margin-top:80px;
    /*top: 600px;*/
}

.container{
    margin-left: 560px;
    margin-top: -150px;
}

.input-boxes{
    display: flex;
    gap:70px;
    margin-bottom: 10px;
}

label{
    display: block;
    margin-bottom: 5px;
}
textarea{
    gap: 20px;
    
}
h1{
    font-size: 30px;
}
h3{
    margin-bottom: 30px;
}
p{
    margin: 0;
    margin-bottom: 3px;

}
button{
    background-color: #14779b;
    border-radius: 20px;
    height: 40px;
    width: 100px;
    margin-top: 20px;
    animation-name: button;
}
.btn{
background:#3eabd2;
color:rgb(51, 50, 50);
padding:12px 25px;
border:none;
border-radius:25px;
cursor:pointer;
font-size:16px;
transition:0.4s;
}
.btn:hover{
background:rgb(25, 138, 134);
color:#56c6ef;
transform:scale(1.1);
box-shadow:0 0 5px #56c6ef;
}
.header{                 
    display:flex;        
    justify-content:space-between;  
    align-items:center;  
    padding-top: 10px;
}

.navbar{
    display:flex;
    margin-right: 180px;
}
.navbar a:hover{
font-size:17px;
color: #56c6ef;

}
.navbar a{
    text-decoration: none;
    margin-left: 20px;
    color: aliceblue;
}


</style>
</head>

<body>

<div class="outer">
    <div class="header"> 

        <h2 class="logo">Portfolio</h2>

        <div class="navbar">
            <a href="home.html">Home</a>
            <a href="Skills.html">Skills</a>
            <a href="certificates.html">Certificates</a>
            <a href="Projects.html">Project</a>
            <a href="Contact.html">Contact</a>
        </div>
    </div>

    <div class="content">
        <h1><b style="color:#56c6ef;">Get in Touch</b></h1>
        <h3>I'd like to hear from you!</h3>
        <p>If you have any inquiries or just want to</p>
        <p>say hi,please use the contact form!</p>
    </div>

    <form>

        <div class="container">

            <div class="input-boxes">

                <div class="input">
                    <label>First name</label>
                    <input type="text">
                </div>

                <div class="input">
                    <label>Last name</label>
                    <input type="text">
                </div>

            </div>

            <label>Email <b style="color:red;">*</b></label>
            <input type="email" required>

            <label>Message</label>
            <textarea rows="6" cols="46"></textarea><br>
            <button class="btn"><b>Send</b></button>

        </div>

    </form>   

</div>


</body>
</html>
